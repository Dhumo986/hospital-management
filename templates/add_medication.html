{% extends "base.html" %}
{% block title %}Add Medication{% endblock %}
{% block page_title %}Add Medication{% endblock %}

{% block content %}
<div class="card" style="max-width:600px">
  <div class="card-header"><h2>Medication Details</h2></div>
  <div class="card-body">
    <form method="POST" action="/medications/add">
      <div class="form-grid">
        <div class="form-group full">
          <label>Medication Name</label>
          <input name="name" required placeholder="e.g. Aspirin"/>
        </div>
        <div class="form-group">
          <label>Dosage</label>
          <input name="dosage" placeholder="e.g. 100mg"/>
        </div>
        <div class="form-group">
          <label>Manufacturer</label>
          <input name="manufacturer" placeholder="e.g. Bayer"/>
        </div>
        <div class="form-group full">
          <label>Side Effects</label>
          <textarea name="side_effects" placeholder="e.g. Nausea, dizziness"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Add Medication</button>
        <a href="/medications" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
