{% extends "base.html" %}
{% block title %}Edit Doctor{% endblock %}
{% block page_title %}Edit Doctor{% endblock %}

{% block content %}
<div class="card" style="max-width:720px">
  <div class="card-header"><h2>Edit Doctor #{{ doctor.DoctorID }}</h2></div>
  <div class="card-body">
    <form method="POST" action="/doctors/edit/{{ doctor.DoctorID }}">
      <div class="form-grid">
        <div class="form-group full">
          <label>Full Name</label>
          <input name="name" value="{{ doctor.Name }}" required/>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input name="phone" value="{{ doctor.Phone or '' }}"/>
        </div>
        <div class="form-group">
          <label>Specialty</label>
          <select name="specialty">
            {% for s in ['Cardiologist','Neurologist','Orthopedic Surgeon','Emergency Physician','General Practitioner'] %}
            <option {% if doctor.Specialty == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Department</label>
          <select name="department_id">
            {% for dept in departments %}
            <option value="{{ dept.DepartmentID }}" {% if doctor.DepartmentID == dept.DepartmentID %}selected{% endif %}>
              {{ dept.Name }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="/doctors" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
