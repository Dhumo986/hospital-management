{% extends "base.html" %}
{% block title %}Add Doctor{% endblock %}
{% block page_title %}Add New Doctor{% endblock %}

{% block content %}
<div class="card" style="max-width:720px">
  <div class="card-header"><h2>Doctor Information</h2></div>
  <div class="card-body">
    <form method="POST" action="/doctors/add">
      <div class="form-grid">
        <div class="form-group full">
          <label>Full Name</label>
          <input name="name" required placeholder="Dr. Jane Smith"/>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input name="phone" placeholder="850-123-4567"/>
        </div>
        <div class="form-group">
          <label>License Number</label>
          <input name="license_number" required placeholder="LIC-123456"/>
        </div>
        <div class="form-group">
          <label>Specialty</label>
          <select name="specialty">
            <option>Cardiologist</option>
            <option>Neurologist</option>
            <option>Orthopedic Surgeon</option>
            <option>Emergency Physician</option>
            <option>General Practitioner</option>
          </select>
        </div>
        <div class="form-group">
          <label>Department</label>
          <select name="department_id">
            {% for dept in departments %}
            <option value="{{ dept.DepartmentID }}">{{ dept.Name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Add Doctor</button>
        <a href="/doctors" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
