{% extends "base.html" %}
{% block title %}Add Patient{% endblock %}
{% block page_title %}Add New Patient{% endblock %}

{% block content %}
<div class="card" style="max-width:720px">
  <div class="card-header"><h2>Patient Information</h2></div>
  <div class="card-body">
    <form method="POST" action="/patients/add">
      <div class="form-grid">
        <div class="form-group full">
          <label>Full Name</label>
          <input name="name" required placeholder="John Doe"/>
        </div>
        <div class="form-group">
          <label>Date of Birth</label>
          <input name="dob" type="date"/>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select name="gender">
            <option>Male</option><option>Female</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input name="phone" placeholder="850-123-4567"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input name="email" type="email" placeholder="john@email.com"/>
        </div>
        <div class="form-group">
          <label>Blood Type</label>
          <select name="blood_type">
            <option value="">— Select —</option>
            <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
            <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Address</label>
          <input name="address" placeholder="123 Main St, Tallahassee, FL"/>
        </div>
        <div class="form-group">
          <label>Insurance Provider</label>
          <input name="insurance_provider" placeholder="BlueCross"/>
        </div>
        <div class="form-group">
          <label>Policy Number</label>
          <input name="policy_number" placeholder="POL-123456"/>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Add Patient</button>
        <a href="/patients" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
